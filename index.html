<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קיץ של ספורט 2026 — לוח תוצאות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;800;900&family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-deep:   #0B5D6D;
    --teal-dark:   #073F49;
    --gold:        #F2A93B;
    --coral:       #EF6F6C;
    --cream:       #FFF8ED;
    --sand:        #F4E3C1;
    --lane-line:   rgba(255,248,237,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      repeating-linear-gradient(180deg, transparent 0 78px, var(--lane-line) 78px 82px),
      linear-gradient(160deg, var(--teal-dark) 0%, var(--teal-deep) 55%, #0E7385 100%);
    font-family:'Heebo', sans-serif;
    color:var(--cream);
    padding:32px 16px 64px;
  }
  .wrap{max-width:760px; margin:0 auto;}

  header{text-align:center; margin-bottom:8px;}
  .eyebrow{
    font-family:'Rubik',sans-serif;
    font-weight:700;
    letter-spacing:.14em;
    font-size:13px;
    color:var(--gold);
    text-transform:uppercase;
  }
  h1{
    font-family:'Rubik',sans-serif;
    font-weight:900;
    font-size:clamp(34px,7vw,54px);
    margin:6px 0 4px;
    color:var(--cream);
    text-shadow:0 3px 0 rgba(0,0,0,0.18);
  }
  .subtitle{
    font-size:15px;
    color:var(--sand);
    opacity:.85;
    margin-bottom:36px;
  }

  /* podium */
  .podium{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:10px;
    margin:0 auto 48px;
    max-width:620px;
  }
  .pod{
    flex:1;
    text-align:center;
    position:relative;
  }
  .pod .medal{
    font-family:'Rubik',sans-serif;
    font-weight:900;
    font-size:15px;
    width:34px;height:34px;
    line-height:34px;
    border-radius:50%;
    margin:0 auto 8px;
    color:var(--teal-dark);
  }
  .pod .name{
    font-family:'Rubik',sans-serif;
    font-weight:800;
    font-size:clamp(12px,3.4vw,17px);
    margin-bottom:2px;
    line-height:1.25;
    overflow-wrap:break-word;
    padding:0 2px;
  }
  .pod .pts{
    font-size:13px;
    color:var(--sand);
    margin-bottom:10px;
  }
  .pod .block{
    border-radius:10px 10px 0 0;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding-top:10px;
    font-family:'Rubik',sans-serif;
    font-weight:900;
    color:rgba(11,61,73,0.55);
  }
  .p1 .block{height:132px; background:linear-gradient(180deg,#FFD976,var(--gold)); font-size:34px;}
  .p2 .block{height:96px;  background:linear-gradient(180deg,#E4EEF0,#C3D2D5); font-size:28px;}
  .p3 .block{height:72px;  background:linear-gradient(180deg,#E7B385,#CC8E5C); font-size:24px;}
  .p1 .medal{background:var(--gold);}
  .p2 .medal{background:#D7E1E3;}
  .p3 .medal{background:#D79A66;}

  /* lineup list */
  .lineup{
    background:rgba(255,248,237,0.05);
    border:1px solid rgba(255,248,237,0.12);
    border-radius:16px;
    overflow:hidden;
  }
  .row{
    display:grid;
    grid-template-columns:44px 1fr auto;
    align-items:center;
    gap:14px;
    padding:14px 18px;
    border-bottom:1px solid rgba(255,248,237,0.08);
  }
  .row:last-child{border-bottom:none;}
  .lane{
    font-family:'Rubik',sans-serif;
    font-weight:800;
    font-size:13px;
    color:var(--teal-dark);
    background:var(--sand);
    width:30px;height:30px;
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
  }
  .row-main{min-width:0;}
  .row-name{
    font-family:'Rubik',sans-serif;
    font-weight:700;
    font-size:16px;
    margin-bottom:6px;
  }
  .track{
    height:8px;
    background:rgba(255,248,237,0.1);
    border-radius:99px;
    overflow:hidden;
  }
  .track-fill{
    height:100%;
    border-radius:99px;
    background:linear-gradient(90deg,var(--coral),var(--gold));
  }
  .row-pts{
    font-family:'Rubik',sans-serif;
    font-weight:900;
    font-size:20px;
    color:var(--gold);
    min-width:40px;
    text-align:left;
  }
  .row-pts span{
    font-family:'Heebo',sans-serif;
    font-weight:400;
    font-size:11px;
    color:var(--sand);
    opacity:.7;
    display:block;
    margin-top:1px;
  }

  footer{
    text-align:center;
    font-size:12px;
    color:var(--sand);
    opacity:.55;
    margin-top:28px;
  }

  .status{
    text-align:center;
    font-size:13px;
    color:var(--sand);
    opacity:.8;
    margin-bottom:20px;
  }
  .status.error{
    color:var(--coral);
    opacity:1;
    background:rgba(239,111,108,0.12);
    border:1px solid rgba(239,111,108,0.35);
    border-radius:10px;
    padding:10px 14px;
    max-width:520px;
    margin:0 auto 20px;
    line-height:1.6;
  }

  .refresh-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:20px;
  }
  #refreshBtn{
    font-family:'Heebo',sans-serif;
    font-weight:600;
    font-size:13px;
    color:var(--teal-dark);
    background:var(--gold);
    border:none;
    border-radius:99px;
    padding:8px 18px;
    cursor:pointer;
  }
  #refreshBtn:hover{filter:brightness(1.05);}
  #refreshBtn:disabled{opacity:.6; cursor:default;}
  #lastUpdated{
    font-size:12px;
    color:var(--sand);
    opacity:.6;
  }

  @media (max-width:480px){
    .p1 .block{height:104px;font-size:28px;}
    .p2 .block{height:78px;font-size:22px;}
    .p3 .block{height:58px;font-size:19px;}
    .row{grid-template-columns:36px 1fr auto; padding:12px 14px;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Summer of Sport</div>
      <h1>קיץ של ספורט 2026</h1>
      <div class="subtitle">לוח התוצאות המצטבר</div>
    </header>

    <div id="status" class="status">טוען נתונים מהגיליון…</div>

    <div class="podium" id="podium"></div>

    <div class="lineup" id="lineup"></div>

    <div class="refresh-row">
      <button id="refreshBtn">🔄 רענון</button>
      <span id="lastUpdated"></span>
    </div>

    <footer>מבוסס על סך הכל הנקודות שדווחו בכל שורה, לפי שם — נשלף ישירות מהגיליון</footer>
  </div>

<script>
  // ---- Source spreadsheet ----
  // https://docs.google.com/spreadsheets/d/1LsOzbB486hw78CS68YDpovqNEnGLSs4rQOiEPHeGTFE/edit?gid=138345157
  const SHEET_ID = '1LsOzbB486hw78CS68YDpovqNEnGLSs4rQOiEPHeGTFE';
  const GID = '138345157';
  // Column layout in "Form Responses 1": A Timestamp, B Email, C שם (name), D יום,
  // E-H parts, I סה״כ נקודות (total points for that row)
  const NAME_COL = 2;   // column C
  const POINTS_COL = 8; // column I

  const statusEl = document.getElementById('status');
  const podiumEl = document.getElementById('podium');
  const lineupEl = document.getElementById('lineup');
  const lastUpdatedEl = document.getElementById('lastUpdated');
  const refreshBtn = document.getElementById('refreshBtn');

  // Fallback snapshot, used only if the live fetch fails (e.g. sheet not public, or offline)
  const FALLBACK_ROWS = [
    ["אהרן", 6], ["רבקה", 4], ["דוד", 6], ["יצחק", 2],
    ["Tikva", 4], ["שלמה", 6], ["שלמה", 6], ["Tikva", 4],
    ["EC", 3], ["Zaidy", 1],
  ];

  function aggregate(rows) {
    const totals = {};
    rows.forEach(([name, pts]) => {
      if (!name) return;
      const n = String(name).trim();
      const p = Number(pts);
      if (!n || Number.isNaN(p)) return;
      totals[n] = (totals[n] || 0) + p;
    });
    return Object.entries(totals)
      .map(([name, pts]) => ({name, pts}))
      .sort((a,b) => b.pts - a.pts);
  }

  function groupByRank(ranked) {
    // Groups consecutive (already sorted desc) entries that share the same points total,
    // assigning standard competition ranks (1,2,2,4,...) to each group.
    const groups = [];
    ranked.forEach((person, i) => {
      const prev = groups[groups.length - 1];
      if (prev && prev.pts === person.pts) {
        prev.names.push(person.name);
      } else {
        groups.push({pts: person.pts, names: [person.name], rank: i + 1});
      }
    });
    return groups;
  }

  function render(ranked) {
    podiumEl.innerHTML = '';
    lineupEl.innerHTML = '';
    if (ranked.length === 0) {
      statusEl.textContent = 'לא נמצאו שורות נתונים בגיליון עדיין.';
      statusEl.classList.remove('error');
      return;
    }
    const maxPts = ranked[0].pts || 1;
    const groups = groupByRank(ranked);

    const top3Groups = groups.slice(0, 3);
    const order = [top3Groups[1], top3Groups[0], top3Groups[2]].filter(Boolean);
    const medals = {0:'🥇', 1:'🥈', 2:'🥉'};
    order.forEach(group => {
      const idx = top3Groups.indexOf(group);
      const cls = idx === 0 ? 'p1' : idx === 1 ? 'p2' : 'p3';
      const div = document.createElement('div');
      div.className = 'pod ' + cls;
      div.innerHTML = `
        <div class="medal">${idx+1}</div>
        <div class="name">${group.names.join(' / ')}</div>
        <div class="pts">${group.pts} נק'</div>
        <div class="block">${medals[idx]}</div>
      `;
      podiumEl.appendChild(div);
    });

    groups.forEach(group => {
      const pct = Math.max(6, Math.round((group.pts / maxPts) * 100));
      group.names.forEach(name => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <div class="lane">${group.rank}</div>
          <div class="row-main">
            <div class="row-name">${name}</div>
            <div class="track"><div class="track-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="row-pts">${group.pts}<span>נק'</span></div>
        `;
        lineupEl.appendChild(row);
      });
    });
  }

  async function loadFromSheet() {
    refreshBtn.disabled = true;
    statusEl.style.display = 'block';
    statusEl.textContent = 'טוען נתונים מהגיליון…';
    statusEl.classList.remove('error');

    // Remove any previous loader script/callback to avoid collisions on refresh
    const prevScript = document.getElementById('gviz-loader');
    if (prevScript) prevScript.remove();

    const callbackName = 'gvizCallback_' + Date.now();
    let settled = false;

    const timeout = setTimeout(() => {
      if (settled) return;
      settled = true;
      handleFailure(new Error('Timed out waiting for sheet data'));
    }, 12000);

    window[callbackName] = function(response) {
      if (settled) return;
      settled = true;
      clearTimeout(timeout);
      delete window[callbackName];
      try {
        if (!response || response.status === 'error') {
          throw new Error((response && response.errors && response.errors[0] && response.errors[0].detailed_message) || 'Sheet returned an error');
        }
        const gvizRows = (response.table && response.table.rows) || [];
        const rows = gvizRows.map(r => {
          const c = r.c || [];
          const cell = idx => (c[idx] ? c[idx].v : undefined);
          return [cell(NAME_COL), cell(POINTS_COL)];
        }).filter(([name, pts]) => name && String(name).trim() !== '' && pts !== undefined && pts !== null && pts !== '');

        if (rows.length === 0) throw new Error('No data rows found');
        render(aggregate(rows));
        statusEl.style.display = 'none';
        lastUpdatedEl.textContent = 'עודכן לאחרונה: ' + new Date().toLocaleString('he-IL');
      } catch (err) {
        handleFailure(err);
      } finally {
        refreshBtn.disabled = false;
      }
    };

    function handleFailure(err) {
      console.error('Live fetch failed, using fallback snapshot:', err);
      statusEl.style.display = 'block';
      statusEl.classList.add('error');
      statusEl.textContent = 'לא הצלחתי לטעון נתונים חיים מהגיליון (ייתכן שהגיליון אינו משותף כ"כל מי שיש לו את הקישור"). מוצג צילום מצב אחרון שידוע.';
      render(aggregate(FALLBACK_ROWS));
      lastUpdatedEl.textContent = '';
      refreshBtn.disabled = false;
    }

    const script = document.createElement('script');
    script.id = 'gviz-loader';
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID}&tqx=out:json;responseHandler:${callbackName}&_ts=${Date.now()}`;
    script.onerror = () => {
      if (settled) return;
      settled = true;
      clearTimeout(timeout);
      delete window[callbackName];
      handleFailure(new Error('Script failed to load (network or CORS-adjacent block)'));
    };
    document.body.appendChild(script);
  }

  refreshBtn.addEventListener('click', loadFromSheet);
  loadFromSheet();
</script>
</body>
</html>
